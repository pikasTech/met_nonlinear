version: 1
disable_existing_loggers: false

formatters:
  detailed:
    format: '%(asctime)s - %(levelname)-8s - %(filename)s:%(lineno)d - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  simple:
    '()': logger.custom_formatter.SecondsFormatter
    format: '[%(levelname)-5s %(relative_seconds)3.2fs] %(message)s | %(filename)s:%(lineno)d'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/cli.log  # 将在运行时动态设置
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/cli_errors.log  # 将在运行时动态设置
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

loggers:
  cli:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  
  inference:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  core:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  # 第三方库设置为 WARNING 以减少噪音
  tensorflow:
    level: WARNING
  matplotlib:
    level: WARNING
  spicelib:
    level: WARNING

root:
  level: INFO
  handlers: [console, file]