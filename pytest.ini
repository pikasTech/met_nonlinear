[pytest]
# pytest-parallel configuration
# Supports: --workers=N (number of parallel workers)
#           --tests-per-worker=N (tests per worker process)
# Windows: 使用 --tests-per-worker=1 (no fork() support on Windows)

# 测试目录
testpaths = src/tests

# 测试文件模式
python_files = test_*.py *_test.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 最小版本要求
minversion = 7.0

# 默认选项 (可在CLI中覆盖)
addopts =
    -ra
    --strict-markers
    --tb=short

# 标记定义
markers =
    slow: 标记为慢速测试
    skip_on_ci: 在CI环境中跳过的测试
    requires_gpu: 需要GPU的测试
    integration: 集成测试

# 超时设置 (默认5分钟，单个测试)
timeout = 300

# 覆盖率选项
[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    setup.py
    */venv/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: