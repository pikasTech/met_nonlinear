[pytest]
# 测试目录
testpaths = tests spice_simulator/tests analysis/tests inference/tests logger/tests

# 测试文件模式
python_files = test_*.py *_test.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 最小版本要求
minversion = 7.0

# 显示额外的汇总信息
addopts = -ra --strict-markers

# 标记定义
markers =
    slow: 标记为慢速测试
    skip_on_ci: 在CI环境中跳过的测试
    requires_gpu: 需要GPU的测试
    integration: 集成测试

# 超时设置
timeout = 300

# 覆盖率选项
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*
    setup.py
    */venv/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: