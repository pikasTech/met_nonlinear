[pytest]
# 显示所有测试的详细输出
verbose = true

# 测试超时时间(秒)
timeout = 30

# 不运行标记为slow的测试（除非显式指定）
addopts = -xvs --no-header --durations=10 -k "not slow"

# 测试文件的匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试所在的目录
testpaths = calibration_analyzer/tests

# 标记定义
markers =
    slow: 标记为慢速测试
    integration: 标记为集成测试 