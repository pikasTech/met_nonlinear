services:
  met-nonlinear-ts:
    build:
      context: .
      dockerfile: docker/unidesk/Dockerfile.server
    image: met-nonlinear-ts:local
    container_name: met-nonlinear-ts
    restart: unless-stopped
    ports:
      - "127.0.0.1:3288:3288"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3288"
      MET_ROOT: /workspace/met_nonlinear
      MET_DATA_ROOT: /data
      MET_HOST_ROOT: /home/ubuntu/met_nonlinear
      MET_HOST_DATA_ROOT: /mnt/f/BaiduSyncdisk/data
      MET_STATE_DIR: /workspace/met_nonlinear/.state/unidesk-met
      MET_LOG_DIR: /workspace/met_nonlinear/logs/unidesk-met
      MET_ML_IMAGE: met-nonlinear-ml:tf26
      LD_LIBRARY_PATH: /usr/lib/wsl/lib:/usr/local/cuda/lib64
    volumes:
      - .:/workspace/met_nonlinear
      - /mnt/f/BaiduSyncdisk/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro
      - /dev/dxg:/dev/dxg
    healthcheck:
      test:
        - CMD-SHELL
        - bun -e 'fetch("http://127.0.0.1:3288/health").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'
      interval: 20s
      timeout: 5s
      retries: 3
